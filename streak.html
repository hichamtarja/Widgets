<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Streak Counter</title>
  <link rel="stylesheet" href="streak_style.css">
</head>
<body>

<div class="container">
  <h1>🔥 Streak</h1>
  <div id="counter">0</div>

  <div class="buttons">
    <button onclick="increase()">+</button>
    <button onclick="decrease()">-</button>
    <button onclick="reset()">Reset</button>
  </div>

  <p id="status">Start your streak 🚀</p>
</div>

<script src="steak_script.js"></script>
</body>
</html>

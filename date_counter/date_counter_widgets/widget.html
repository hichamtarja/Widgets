<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Date Counter Widget</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a href="../index.html" class="back-btn" title="Back to widgets">←</a>

  <div class="container">
    <div id="input-section">
      <h1 id="counter-title">Date Counter</h1>

      <input type="text" id="title" placeholder="Enter title...">
      <input type="date" id="start-date">
      <input type="date" id="end-date">
      <textarea id="quote" placeholder="Enter quote..."></textarea>

      <button id="start-btn" type="button">Start Counter</button>
    </div>

    <div id="counter-section" style="display:none;">
      <h1 id="display-title"></h1>

      <div class="dates">
        <p>Start: <span id="display-start"></span></p>
        <p>End: <span id="display-end"></span></p>
      </div>

      <div class="progress-container">
        <img src="runner.gif" class="runner" id="runner" alt="runner">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>

      <div class="controls">
        <button id="add-milestone-btn">+ Milestone</button>
        <button id="view-milestones-btn">View Milestones</button>
        <button id="toggle-tools-btn">Hide Tools</button>
      </div>

      <div id="countdown"></div>

      <p id="display-quote"></p>
      <button id="reset-btn">Reset</button>
    </div>
  </div>

  <div id="milestone-modal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2>Add Milestone</h2>
      <input type="text" id="ms-title" placeholder="Milestone Title">
      <input type="date" id="ms-start">
      <input type="date" id="ms-end">
      <button id="ms-save">Save Milestone</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

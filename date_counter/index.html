<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Date Counter Streak</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- Input form -->
  <div id="input-section">
    <h1>Date Counter Streak</h1>
    <input type="text" id="title" placeholder="Enter Title">
    <input type="date" id="start-date">
    <input type="date" id="end-date">
    <textarea id="quote" placeholder="Enter a quote or message"></textarea>
    <button id="start-btn" type="button">Start Counter</button>
  </div>

  <!-- Countdown display -->
  <div id="counter-section" style="display:none;">
    <h1 id="counter-title"></h1>
    <div class="dates">
      <p>Start: <span id="display-start"></span></p>
      <p>End: <span id="display-end"></span></p>
    </div>
    <div id="countdown">
      <div><span id="years">0</span> Years</div>
      <div><span id="months">0</span> Months</div>
      <div><span id="weeks">0</span> Weeks</div>
      <div><span id="days">0</span> Days</div>
      <div><span id="hours">0</span> Hours</div>
      <div><span id="minutes">0</span> Minutes</div>
      <div><span id="seconds">0</span> Seconds</div>
    </div>
    <p id="display-quote"></p>
    <button id="reset-btn">Reset</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>

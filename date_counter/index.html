<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⏳ Date Counter · Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-page">
  <a href="../index.html" class="home-btn">🏠 Home</a>

  <div class="dashboard">
    <header class="dashboard-header">
      <div>
        <h1>⏳ Date Counters</h1>
        <p class="subtitle">Create and manage custom countdowns / date trackers.</p>
      </div>
      <div class="header-actions">
        <button id="export-data-btn" class="icon-btn" title="Export all data">📤</button>
        <button id="import-data-btn" class="icon-btn" title="Import data">📥</button>
        <input type="file" id="import-file-input" accept=".json" style="display:none">
      </div>
    </header>

    <!-- Stats Row -->
    <div class="stats-row">
      <div class="stat-card">
        <span class="stat-icon">📊</span>
        <div class="stat-content">
          <span class="stat-value" id="total-widgets">0</span>
          <span class="stat-label">Total Counters</span>
        </div>
      </div>
      <div class="stat-card">
        <span class="stat-icon">📅</span>
        <div class="stat-content">
          <span class="stat-value" id="active-counters">0</span>
          <span class="stat-label">Active (with dates)</span>
        </div>
      </div>
    </div>

    <!-- Controls Bar -->
    <div class="controls-bar">
      <div class="search-wrapper">
        <input type="text" id="search-input" placeholder="🔍 Search counters..." class="search-input">
      </div>
      <div class="sort-wrapper">
        <label for="sort-select">Sort by:</label>
        <select id="sort-select" class="sort-select">
          <option value="name-asc">Name (A-Z)</option>
          <option value="name-desc">Name (Z-A)</option>
          <option value="date-desc">Newest First</option>
          <option value="date-asc">Oldest First</option>
        </select>
      </div>
      <button id="create-widget-btn" class="primary-btn">+ Create New Counter</button>
    </div>

    <!-- Widget Grid -->
    <div id="widget-list" class="widget-list"></div>
  </div>

  <!-- Create/Edit Modal -->
  <div id="widget-modal" class="modal-overlay hidden">
    <div class="modal-card">
      <h3 id="modal-title">Create New Counter</h3>
      <form id="widget-form">
        <input type="hidden" id="widget-id">
        <div class="form-group">
          <label for="widget-title-input">Counter Title</label>
          <input type="text" id="widget-title-input" required placeholder="e.g., 'Project Deadline'">
        </div>
        <div class="form-group">
          <label for="widget-quote-input">Quote / Description (optional)</label>
          <input type="text" id="widget-quote-input" placeholder="e.g., 'Stay focused!'">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="start-date-input">Start Date (optional)</label>
            <input type="date" id="start-date-input">
          </div>
          <div class="form-group">
            <label for="end-date-input">End Date (optional)</label>
            <input type="date" id="end-date-input">
          </div>
        </div>
        <p class="form-hint">If only one date is set, the counter will show days since/until that date.</p>
        <div class="modal-actions">
          <button type="button" id="modal-cancel" class="secondary-btn">Cancel</button>
          <button type="submit" class="primary-btn">Save Counter</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div id="confirm-modal" class="modal-overlay hidden">
    <div class="modal-card">
      <h3>Confirm Deletion</h3>
      <p id="confirm-message">Are you sure you want to delete this counter?</p>
      <div class="modal-actions">
        <button id="confirm-cancel" class="secondary-btn">Cancel</button>
        <button id="confirm-ok" class="danger-btn">Delete</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Widget Hub · Dashboard</title>
  <!-- SortableJS for drag-and-drop -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <!-- Confetti for celebrations (optional sound effect trigger) -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Floating emojis (now with hover + parallax) -->
  <div class="floating" id="floatingEmojis" aria-hidden="true">
    <span data-emoji="🌟">🌟</span>
    <span data-emoji="🔥">🔥</span>
    <span data-emoji="🎞">🎞</span>
    <span data-emoji="✨">✨</span>
    <span data-emoji="💫">💫</span>
    <span data-emoji="😎">😎</span>
    <span data-emoji="⌛">⌛</span>
    <span data-emoji="🕺">🕺</span>
    <span data-emoji="⚡">⚡</span>
  </div>

  <!-- Controls Bar -->
  <div class="controls">
    <div class="greeting-clock" id="greetingClock"></div>
    
    <button id="themeToggle" class="control-btn" aria-label="Toggle dark/light mode">
      <span class="theme-icon">🌙</span>
      <span class="theme-text">Dark</span>
    </button>
    
    <div class="accent-picker">
      <label for="accentColor">Accent</label>
      <input type="color" id="accentColor" value="#38bdf8">
    </div>

    <div class="layout-controls">
      <button id="exportLayoutBtn" class="control-btn" title="Export layout">📤 Export</button>
      <button id="importLayoutBtn" class="control-btn" title="Import layout">📥 Import</button>
      <input type="file" id="importFileInput" accept=".json" style="display:none">
      <button id="resetLayoutBtn" class="control-btn" title="Reset to default">🔄 Reset</button>
    </div>

    <button id="soundToggle" class="control-btn" aria-label="Toggle sound effects">
      <span class="sound-icon">🔇</span>
    </button>
  </div>

  <!-- Category filter chips -->
  <div class="category-filter">
    <span class="filter-label">Filter:</span>
    <div class="filter-chips" id="filterChips">
      <!-- Dynamically populated by JS -->
    </div>
  </div>

  <!-- Sort options -->
  <div class="sort-options">
    <span>Sort by:</span>
    <button data-sort="default" class="sort-btn active">Default</button>
    <button data-sort="most-used" class="sort-btn">Most Used</button>
    <button data-sort="recent" class="sort-btn">Recently Used</button>
  </div>

  <!-- Main dashboard container -->
  <main class="container">
    <h1>✨ My Widget Hub</h1>

    <!-- Card grid -->
    <div class="cards" id="cardsContainer">
      <!-- Cards will be dynamically rendered by JS for easier maintenance -->
    </div>
  </main>

  <!-- Custom context menu (hidden by default) -->
  <div id="contextMenu" class="context-menu">
    <div class="context-item" data-action="open">Open</div>
    <div class="context-item" data-action="open-new-tab">Open in New Tab</div>
    <div class="context-item" data-action="copy-link">Copy Link</div>
    <div class="context-divider"></div>
    <div class="context-item" data-action="edit-note">Edit Note</div>
    <div class="context-item" data-action="clear-note">Clear Note</div>
  </div>

  <!-- Note editor modal (hidden) -->
  <div id="noteModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h3>Edit Note</h3>
      <textarea id="noteInput" rows="4" placeholder="Add a personal note..."></textarea>
      <button id="saveNoteBtn">Save</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

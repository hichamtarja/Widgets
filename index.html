<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Floating shapes -->
<div class="floating">
  <span>🌟</span>
  <span>🔥</span>
  <span>🎞</span>
  <span>✨</span>
  <span>💫</span>
  <span>😎</span>
  <span>⌛</span>
  <span>🕺</span>
  <span>⚡</span>
</div>

<div class="container">
  <h1>My Widget Gallery</h1>
  <div class="gallery">
    <!-- Image Slider Card -->
    <div class="card" onclick="goTo('image_slider/index.html')">
      🎞
      <h2>Image Slider</h2>
      <p>View your GIF collection in style</p>
    </div>

    <!-- Streak Counter Card -->
    <div class="card" onclick="goTo('streak/index.html')">
      🔥
      <h2>Streak Counter</h2>
      <p>Track your daily progress</p>
      <span class="badge" id="streak-badge">3 days</span>
    </div>

    <!-- Date Counter Card -->
    <div class="card" onclick="goTo('date_counter/index.html')">
      <div class="icon">⌛</div>
      <h2>Date Counter</h2>
      <p>Track time between two dates with a live countdown.</p>
    </div>

    <!-- Add more cards here -->
  </div>
</div>

<script src="script.js"></script>
</body>
</html>

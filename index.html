<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Widget Hub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="floating">
  <span>🌟</span>
  <span>🔥</span>
  <span>🎞</span>
  <span>✨</span>
  <span>💫</span>
  <span>😎</span>
  <span>⌛</span>
  <span>🕺</span>
  <span>⚡</span>
</div>

<div class="container">
  <h1>My Widget Hub</h1>

  <div class="cards">

    <div class="card" onclick="goTo(event, 'image_slider/index.html')">
      <div class="icon">🎞</div>
      <h2>Image Slider</h2>
      <p>View your favorite GIFs in a clean slider.</p>
    </div>

    <div class="card" onclick="goTo(event, 'streak/index.html')">
      <div class="icon">🔥</div>
      <h2>Streak Counter</h2>
      <p>Track your daily consistency streak.</p>
    </div>

    <div class="card" onclick="goTo(event, 'date_counter/index.html')">
      <div class="icon">⏳</div>
      <h2>Date Counter</h2>
      <p>Live countdown between two dates.</p>
    </div>

    <div class="card" onclick="goTo(event, 'pomodoro/index.html')">
      <div class="icon">🍅</div>
      <h2>Pomodoro Suite · Focus & Tasks</h2>
      <p>TTime-management</p>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>

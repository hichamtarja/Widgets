<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Streak Widget</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="widget-page">
  <a href="../index.html" class="back-btn" title="Back to widgets">←</a>

  <div class="container">
    <h1 id="widget-title" class="editable-title">🔥 Streak</h1>

    <div id="counter">0</div>

    <div class="buttons">
      <button onclick="increase()">+</button>
      <button onclick="decrease()">-</button>
      <button onclick="reset()">Reset</button>
    </div>

    <p id="status">Start your streak 🚀</p>
  </div>

  <script src="script.js"></script>
</body>
</html>

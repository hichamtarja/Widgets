<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Streak Widget</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-link">← Back to widgets</a>

    <h1 id="widget-title">🔥 Streak</h1>
    <div id="counter">0</div>

    <div class="buttons">
      <button onclick="increase()">+</button>
      <button onclick="decrease()">-</button>
      <button onclick="reset()">Reset</button>
    </div>

    <p id="status">Start your streak 🚀</p>
  </div>

  <script src="script.js"></script>
</body>
</html>

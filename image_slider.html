<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Slider</title>
  <link rel="stylesheet" href="slider_style.css">
</head>
<body>

<div class="slider">
  <div class="slides">
    <img src="identify.gif" class="slide active">
    <img src="respond.gif" class="slide">
    <img src="protect.gif" class="slide">
    <img src="recover.gif" class="slide">
  </div>

  <button class="prev">&#10094;</button>
  <button class="next">&#10095;</button>
</div>

<script src="slider_script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Slider</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="slider" id="slider">
    <!-- Slides container -->
    <div class="slides">
      <img src="images/identify.gif" class="slide active" alt="Identify">
      <img src="images/respond.gif" class="slide" alt="Respond">
      <img src="images/protect.gif" class="slide" alt="Protect">
      <img src="images/recover.gif" class="slide" alt="Recover">
    </div>

    <!-- Navigation buttons -->
    <button class="nav-btn prev" aria-label="Previous slide">‹</button>
    <button class="nav-btn next" aria-label="Next slide">›</button>

    <!-- Slide counter -->
    <div class="slider-counter">
      <span id="current-slide">1</span> / <span id="total-slides">4</span>
    </div>

    <!-- Dot indicators -->
    <div class="dots-container" id="dots-container"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>

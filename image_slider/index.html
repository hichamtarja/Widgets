<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🖼️ Image Sliders · Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-page">
  <a href="../index.html" class="home-btn">🏠 Home</a>

  <div class="dashboard">
    <header class="dashboard-header">
      <div>
        <h1>🖼️ Image Sliders</h1>
        <p class="subtitle">Create and manage your custom image slideshows.</p>
      </div>
      <div class="header-actions">
        <button id="export-data-btn" class="icon-btn" title="Export all data">📤</button>
        <button id="import-data-btn" class="icon-btn" title="Import data">📥</button>
        <input type="file" id="import-file-input" accept=".json" style="display:none">
      </div>
    </header>

    <!-- Stats Row -->
    <div class="stats-row">
      <div class="stat-card">
        <span class="stat-icon">🖼️</span>
        <div class="stat-content">
          <span class="stat-value" id="total-widgets">0</span>
          <span class="stat-label">Total Sliders</span>
        </div>
      </div>
      <div class="stat-card">
        <span class="stat-icon">📸</span>
        <div class="stat-content">
          <span class="stat-value" id="total-images">0</span>
          <span class="stat-label">Total Images</span>
        </div>
      </div>
    </div>

    <!-- Controls Bar -->
    <div class="controls-bar">
      <div class="search-wrapper">
        <input type="text" id="search-input" placeholder="🔍 Search sliders..." class="search-input">
      </div>
      <div class="sort-wrapper">
        <label for="sort-select">Sort by:</label>
        <select id="sort-select" class="sort-select">
          <option value="name-asc">Name (A-Z)</option>
          <option value="name-desc">Name (Z-A)</option>
          <option value="date-desc">Newest First</option>
          <option value="date-asc">Oldest First</option>
          <option value="images-desc">Most Images</option>
          <option value="images-asc">Fewest Images</option>
        </select>
      </div>
      <button id="create-widget-btn" class="primary-btn">+ Create New Slider</button>
    </div>

    <!-- Widget Grid -->
    <div id="widget-list" class="widget-list"></div>
  </div>

  <!-- Create/Edit Modal -->
  <div id="widget-modal" class="modal-overlay hidden">
    <div class="modal-card">
      <h3 id="modal-title">Create New Slider</h3>
      <form id="widget-form">
        <input type="hidden" id="widget-id">
        <div class="form-group">
          <label for="widget-title-input">Slider Title</label>
          <input type="text" id="widget-title-input" required placeholder="My Awesome Slider">
        </div>
        <div class="form-group">
          <label>Image URLs (one per line)</label>
          <textarea id="widget-images-input" rows="5" placeholder="https://example.com/image1.jpg&#10;https://example.com/image2.gif"></textarea>
          <p class="form-hint">Enter full URLs to images (jpg, png, gif, etc.)</p>
        </div>
        <div class="modal-actions">
          <button type="button" id="modal-cancel" class="secondary-btn">Cancel</button>
          <button type="submit" class="primary-btn">Save Slider</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div id="confirm-modal" class="modal-overlay hidden">
    <div class="modal-card">
      <h3>Confirm Deletion</h3>
      <p id="confirm-message">Are you sure you want to delete this slider?</p>
      <div class="modal-actions">
        <button id="confirm-cancel" class="secondary-btn">Cancel</button>
        <button id="confirm-ok" class="danger-btn">Delete</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

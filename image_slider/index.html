<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Slider</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="slider">
  <div class="slides">
    <img src="images/identify.gif" class="slide active">
    <img src="images/respond.gif" class="slide">
    <img src="images/protect.gif" class="slide">
    <img src="images/recover.gif" class="slide">
  </div>

  <button class="prev">&#10094;</button>
  <button class="next">&#10095;</button>
</div>

<script src="script.js"></script>
</body>
</html>

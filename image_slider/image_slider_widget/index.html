<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Slider</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a href="../image_slider_widget/index.html" class="back-btn" title="Back to dashboard">←</a>

  <div class="slider" id="slider">
    <div class="slides" id="slides-container"></div>
    <button class="nav-btn prev" aria-label="Previous">‹</button>
    <button class="nav-btn next" aria-label="Next">›</button>
    <div class="slider-counter"><span id="current-slide">1</span> / <span id="total-slides">0</span></div>
    <div class="dots-container" id="dots-container"></div>
  </div>

  <div id="error-message" class="error-message hidden">Slider not found or no images.</div>

  <script src="script.js"></script>
</body>
</html>
